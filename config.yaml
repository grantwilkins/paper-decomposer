# paper_decomposer_config.yaml
# ──────────────────────────────────────────────────────────
# Model configuration for the paper decomposition pipeline.
# All models are served via Together.ai serverless inference.
# ──────────────────────────────────────────────────────────

api:
  provider: "together"
  base_url: "https://api.together.xyz/v1"
  env_key_var: "TOGETHER_API_KEY"
  max_retries: 3
  retry_backoff_base: 2.0

models:
  small:
    model: "openai/gpt-oss-20b"
    context_length: 128000
    supports_structured_output: true
    input_cost_per_m: 0.05
    output_cost_per_m: 0.20
    temperature: 0.1
    max_tokens: 4096
    notes: >
      Cheapest reliable model with structured output support.
      Used for: seed skeleton extraction, section-level claim
      extraction, facet filling, negative claim extraction.

  medium:
    model: "google/gemma-4-31B-it"
    context_length: 262144
    supports_structured_output: true
    input_cost_per_m: 0.20
    output_cost_per_m: 0.50
    temperature: 0.2
    max_tokens: 8192
    notes: >
      Good reasoning at low cost. Long context useful for
      deduplication (sees all claims at once). Used for:
      claim deduplication, gap verification, tree edge repair.

  heavy:
    model: "MiniMaxAI/MiniMax-M2.7"
    context_length: 262144
    supports_structured_output: true
    input_cost_per_m: 0.30
    output_cost_per_m: 1.20
    temperature: 0.3
    max_tokens: 16384
    notes: >
      Strongest cheap model. Used for: tree assembly from
      claim bags, dependency inference, mechanism fingerprinting,
      final structured entry generation. Runs ONCE per paper
      on the aggregated claim extractions (not the raw PDF text).

pipeline:
  pdf:
    parser: "pymupdf"
    extract_captions: true     # extract figure/table captions
    extract_equations: true
    min_section_chars: 200
    max_section_chars: 12000

  seed:
    model_tier: "small"
    max_claims: 7              # abstracts rarely have >7 claims

  section_extraction:
    model_tier: "small"
    parallel: true             # run section subagents concurrently
    max_concurrent: 8          # max parallel API calls
    include_seed_in_prompt: true  # give subagents the seed skeleton

  # Phase 3: deduplication
  dedup:
    model_tier: "small"
    similarity_threshold: 0.85  # for fuzzy claim matching

  # Phase 4: tree assembly
  tree:
    model_tier: "heavy"
    canonical_label_relabel_tier: "small"
    # The heavy model receives: seed skeleton + all deduplicated
    # claims + facets + negative claims. NOT the raw paper text.
    include_facets: true
    include_negatives: true
    include_evidence_pointers: true

  # Output
  output:
    format: "json"             # or "yaml"
    output_dir: "./output"
    include_raw_claims: true   # keep pre-dedup claims for debugging
    include_section_text: false  # do NOT store raw text in output

# ── Facet templates ────────────────────────────────────────
# See IMPLEMENTATION.md for the full facet question sets.
# This section just lists which domain facets to activate
# per intervention type.

facet_routing:
  architecture: ["A1", "A2", "A3", "A4", "A5"]
  objective: ["O1", "O2", "O3", "O4"]
  algorithm: ["G1", "G2", "G3", "G4", "G5"]
  systems: ["S1", "S2", "S3", "S4", "S5", "S6"]
  theory: ["T1", "T2", "T3", "T4", "T5"]
  representation: ["P1", "P2", "P3", "P4"]
  evaluation: ["E1", "E2", "E3"]
  pipeline: ["L1", "L2", "L3"]
  data: ["E1", "E2"]  # reuses eval facets for dataset papers
