# paper_decomposer_config.yaml
# ──────────────────────────────────────────────────────────
# Configuration for the paper decomposition pipeline.
# Models served via Together.ai serverless inference.
# ──────────────────────────────────────────────────────────

api:
  provider: "together"
  base_url: "https://api.together.xyz/v1"
  env_key_var: "TOGETHER_API_KEY"
  max_retries: 3
  retry_backoff_base: 2.0

models:
  small:
    model: "Qwen/Qwen2.5-7B-Instruct-Turbo"
    context_length: 32768
    supports_structured_output: true
    input_cost_per_m: 0.30
    output_cost_per_m: 0.30
    temperature: 0.1
    max_tokens: 8192
    notes: "Explicit cheap tier. Not the default extraction tier because very small models can return empty structured content on long papers."

  medium:
    model: "openai/gpt-oss-120b"
    context_length: 128000
    supports_structured_output: true
    input_cost_per_m: 0.15
    output_cost_per_m: 0.60
    temperature: 1.0
    top_p: 1.0
    reasoning_effort: low
    max_tokens: 16384
    notes: "Default extraction tier. Fast structured-output tier; deterministic sanitization demotes invalid repaired nodes."

  heavy:
    model: "MiniMaxAI/MiniMax-M2.7"
    context_length: 262144
    supports_structured_output: true
    input_cost_per_m: 0.30
    output_cost_per_m: 1.20
    temperature: 0.3
    max_tokens: 16384

pipeline:
  pdf:
    parser: "pymupdf"
    extract_captions: true
    extract_equations: true
    min_section_chars: 200
    max_section_chars: 12000

  extraction:
    enabled: true
    max_model_calls_per_paper: 6
    max_input_chars_per_stage: 50000
    default_model_tier: medium
    repair_model_tier: medium
    adjudication_model_tier: heavy
    enable_large_model_adjudication: true
    large_model_only_for:
      - final_cleanup
    enable_visual_figure_extraction: false
    include_captions: true
    include_table_text: true
    require_numeric_grounding: false
    caps:
      max_system_nodes: 2
      max_method_nodes: 12
      max_setting_nodes: 30
      max_claims: 25
      max_outcomes: 40
      max_demoted_items: 40

database:
  dsn_env: "PAPER_DECOMPOSER_DSN"
  embedding_model: "text-embedding-3-small"
  embedding_dim: 1536
